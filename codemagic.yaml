workflows:
  android-release:
    name: ea Android Build
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        - ea_keystore
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
